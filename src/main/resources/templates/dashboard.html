<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titulo}">Dashboard</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
        }
        .navbar-custom {
            background: linear-gradient(90deg, #4f46e5, #7c3aed);
            padding: 1rem 2rem;
        }
        .navbar-custom .navbar-brand {
            color: white;
            font-weight: 700;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
        }
        .navbar-custom .navbar-brand i {
            margin-right: 10px;
            font-size: 1.8rem;
        }
        .navbar-custom .nav-link {
            color: rgba(255, 255, 255, 0.9);
            font-weight: 500;
            padding: 0.5rem 1rem;
            border-radius: 10px;
            transition: all 0.3s;
        }
        .navbar-custom .nav-link:hover {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }
        .navbar-custom .nav-link i {
            margin-right: 8px;
        }
        .navbar-custom .btn-login-nav {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 0.5rem 1.2rem;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s;
            margin-left: 10px;
            text-decoration: none;
            display: inline-block;
        }
        .navbar-custom .btn-login-nav:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
            color: white;
        }
        .navbar-custom .btn-register-nav {
            background: white;
            color: #4f46e5;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s;
            margin-left: 10px;
            text-decoration: none;
            display: inline-block;
        }
        .navbar-custom .btn-register-nav:hover {
            background: #f8fafc;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 255, 255, 0.2);
            color: #4f46e5;
        }
        .navbar-custom .user-info {
            display: flex;
            align-items: center;
            color: white;
            background: rgba(255, 255, 255, 0.15);
            padding: 0.3rem 1rem 0.3rem 0.5rem;
            border-radius: 30px;
            margin-left: 10px;
        }
        .navbar-custom .user-info i {
            font-size: 1.3rem;
            margin-right: 8px;
        }
        .navbar-custom .user-info span {
            font-weight: 600;
            margin-right: 10px;
        }
        .dashboard-container {
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }
        .welcome-section {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 2rem;
        }
        .welcome-avatar {
            background: linear-gradient(90deg, #4f46e5, #7c3aed);
            width: 60px;
            height: 60px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2rem;
        }
        .welcome-text h1 {
            font-size: 2rem;
            font-weight: 700;
            color: white;
            margin-bottom: 0.5rem;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }
        .welcome-text p {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.9);
            margin: 0;
        }
        .stats-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            padding: 1.5rem;
            color: white;
            box-shadow: 0 10px 25px rgba(79, 70, 229, 0.2);
            transition: all 0.3s;
            height: 100%;
        }
        .stats-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(79, 70, 229, 0.3);
        }
        .stats-card i {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }
        .stats-card h3 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        .stats-card p {
            font-size: 1rem;
            opacity: 0.9;
            margin: 0;
        }
    </style>
</head>
<body>
<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-custom">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/}">
            <i class="fas fa-lock"></i>
            <span>Mi Aplicación</span>
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon" style="filter: invert(1);"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <!-- Menú principal - SOLO visible con sesión -->
            <ul class="navbar-nav me-auto" th:if="${session.usuario != null}">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}">
                        <i class="fas fa-home"></i> Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/holamundo}">
                        <i class="fas fa-globe"></i> Hola Mundo
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/usuarios}">
                        <i class="fa-solid fa-circle-user"></i> Usuarios
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/galeria}">
                        <i class="fas fa-images"></i> Galería
                    </a>
                </li>
            </ul>

            <!-- Botones de usuario -->
            <ul class="navbar-nav ms-auto">
                <li class="nav-item" th:if="${session.usuario != null}">
                    <div class="user-info">
                        <i class="fas fa-user-circle"></i>
                        <span th:text="${session.usuario.nombreusuario}">Usuario</span>
                    </div>
                </li>
                <li class="nav-item" th:if="${session.usuario != null}">
                    <a class="btn-login-nav" th:href="@{/logout}">
                        <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
                    </a>
                </li>
                <li class="nav-item" th:unless="${session.usuario != null}">
                    <a class="btn-login-nav" th:href="@{/login1}">
                        <i class="fas fa-sign-in-alt"></i> Iniciar Sesión
                    </a>
                </li>
                <li class="nav-item" th:unless="${session.usuario != null}">
                    <a class="btn-register-nav" th:href="@{/registro}">
                        <i class="fas fa-user-plus"></i> Registrarse
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- Contenido principal -->
<div class="dashboard-container">
    <div class="welcome-section">
        <div class="welcome-avatar">
            <i class="fas fa-user"></i>
        </div>
        <div class="welcome-text">
            <h1>
                ¡Bienvenido, <span th:text="${session.usuario != null ? session.usuario.nombreusuario : 'Usuario'}">Usuario</span>!
            </h1>
            <p th:text="${session.usuario != null ? 'Has iniciado sesión correctamente' : 'Por favor inicia sesión'}"></p>
        </div>
    </div>

    <div class="row">
        <div class="col-md-3 col-sm-6 mb-4">
            <div class="stats-card">
                <i class="fas fa-users"></i>
                <h3>156</h3>
                <p>Usuarios</p>
            </div>
        </div>
        <div class="col-md-3 col-sm-6 mb-4">
            <div class="stats-card" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);">
                <i class="fas fa-camera"></i>
                <h3>43</h3>
                <p>Fotos</p>
            </div>
        </div>
        <div class="col-md-3 col-sm-6 mb-4">
            <div class="stats-card" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);">
                <i class="fas fa-image"></i>
                <h3>12</h3>
                <p>Álbumes</p>
            </div>
        </div>
        <div class="col-md-3 col-sm-6 mb-4">
            <div class="stats-card" style="background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);">
                <i class="fas fa-clock"></i>
                <h3>15</h3>
                <p>Minutos</p>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
