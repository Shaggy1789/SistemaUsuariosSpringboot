<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prueba 1.1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/navbar.css">
    <link rel="stylesheet" href="/css/ocultar.css">
    <link rel="stylesheet" href="/css/usuarios.css">
</head>
<body>

<!-- ══ NAVBAR ══ -->
<nav class="topnav">
    <a class="topnav-brand" th:href="@{/}">
        <i class="fas fa-shield-hal"></i> Aegis Auth
    </a>
    <ul class="topnav-menu" id="navMenu">
        <li><a th:href="@{/}"><i class="fas fa-home"></i> Inicio</a></li>
        <li id="navModulosItem" style="display:none;">
            <span>Seguridad <i class="fas fa-chevron-down arrow"></i></span>
            <div class="dropdown-nav" id="navModulosDropdown"></div>
        </li>
    </ul>
    <div class="topnav-right">
        <div class="user-pill" th:if="${session.usuario != null}">
            <i class="fas fa-user-circle"></i>
            <span th:text="${session.usuario.usuario}">Usuario</span>
            <span class="role-tag" th:if="${session.usuario.perfil != null}" th:text="${session.usuario.perfil.nombre}">Rol</span>
        </div>
        <a class="btn-logout" th:if="${session.usuario != null}" th:href="@{/logout}">
            <i class="fas fa-sign-out-alt"></i> Salir
        </a>
    </div>
</nav>

<!-- ══ CONTENT ══ -->
<div class="page-wrap">
    <div class="page-header">
        <div class="page-header-icon"><i class="fas fa-flask"></i></div>
        <h1>🧪 Prueba 1 — Gestión de Registros</h1>
    </div>

    <!-- Filtros -->
    <div class="filtros-captura">
        <div class="filtros-row">
            <div class="filtro-item">
                <label>Nombre:</label>
                <input type="text" id="buscarInput" placeholder="Buscar registro...">
            </div>
            <div class="filtro-item">
                <label>Estado:</label>
                <select id="estadoSelect">
                    <option value="">Todos</option>
                    <option value="ACTIVO">Activo</option>
                    <option value="INACTIVO">Inactivo</option>
                </select>
            </div>
            <div class="filtro-todos">
                <label><input type="checkbox" id="todosCheckbox"> - Todos</label>
            </div>
            <div class="filtro-buttons">
                <button class="btn-buscar" id="buscarBtn"><i class="fas fa-search"></i> Buscar</button>
                <button class="btn-limpiar" id="limpiarBtn"><i class="fas fa-times"></i> Limpiar</button>
            </div>
        </div>
    </div>

    <!-- Resultados -->
    <div class="resultados-header">
        <span class="resultados-label">[Resultados]</span>
        <button class="btn-nuevo" onclick="abrirModalNuevo()">
            <i class="fas fa-plus"></i> Nuevo Registro
        </button>
    </div>

    <!-- Tabla -->
    <div class="table-card">
        <div class="table-responsive">
            <table class="table-custom">
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Estado</th>
                        <th>Creado</th>
                        <th>Actualizado</th>
                        <th>Editar</th>
                        <th>Eliminar</th>
                    </tr>
                </thead>
                <tbody id="tablaRegistros">
                    <tr><td colspan="6" class="state-cell"><i class="fas fa-spinner fa-spin"></i> Cargando...</td></tr>
                </tbody>
            </table>
        </div>
        <div class="pagination-bar">
            <div class="rows-label">
                Filas por página:
                <select id="itemsPerPageSelect">
                    <option value="10">10</option>
                    <option value="20">20</option>
                    <option value="50" selected>50</option>
                    <option value="100">100</option>
                </select>
            </div>
            <span><span id="startRecord">0</span>–<span id="endRecord">0</span> de <strong id="totalRecords">0</strong></span>
            <div style="display:flex;gap:4px;">
                <a href="#" class="pg-arrow" id="prevPage" onclick="cambiarPagina(currentPage-1);return false;"><i class="fas fa-chevron-left"></i></a>
                <a href="#" class="pg-arrow" id="nextPage" onclick="cambiarPagina(currentPage+1);return false;"><i class="fas fa-chevron-right"></i></a>
            </div>
        </div>
    </div>

    <div class="menu-bottom">
        <a th:href="@{/}" class="btn-menu"><i class="fas fa-bars me-1"></i> Menú</a>
    </div>
</div>

<!-- ══ MODAL: CREAR / EDITAR ══ -->
<div class="modal fade" id="registroModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="fas fa-flask"></i> <span id="modalTitleText">Nuevo Registro</span></h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="registroForm">
                    <input type="hidden" id="registroId">
                    <div class="mb-3">
                        <label class="form-label">Nombre *</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-tag"></i></span>
                            <input type="text" class="form-control" id="nombre" placeholder="Nombre del registro" maxlength="255" required>
                        </div>
                        <div id="nombreError" class="invalid-feedback"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Estado</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-toggle-on"></i></span>
                            <select class="form-select" id="estado">
                                <option value="ACTIVO">Activo</option>
                                <option value="INACTIVO">Inactivo</option>
                            </select>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn-gold" onclick="guardarRegistro()"><i class="fas fa-save"></i> Guardar</button>
            </div>
        </div>
    </div>
</div>

<!-- ══ MODAL: ELIMINAR ══ -->
<div class="modal fade" id="eliminarModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header danger">
                <h5 class="modal-title"><i class="fas fa-exclamation-triangle"></i> Confirmar Eliminación</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body text-center py-4">
                <i class="fas fa-trash-alt fa-3x mb-3" style="color:#fc8181;"></i>
                <h5 style="color:#e2e8f0;">¿Eliminar el registro?</h5>
                <p id="registroAEliminar" class="fw-bold" style="color:#fc8181;"></p>
                <p style="color:#94a3b8;font-size:0.85rem;">Esta acción no se puede deshacer.</p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-danger" onclick="confirmarEliminar()"><i class="fas fa-trash me-1"></i>Eliminar</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/sliderbar.js"></script>
<script>
    let registroIdEliminar = null;
    let modalInstance, eliminarModalInstance;
    let currentPage = 1, itemsPerPage = 50;
    let allRegistros = [];

    document.addEventListener('DOMContentLoaded', function () {
        modalInstance = new bootstrap.Modal(document.getElementById('registroModal'));
        eliminarModalInstance = new bootstrap.Modal(document.getElementById('eliminarModal'));
        cargarRegistros();

        document.getElementById('buscarBtn').addEventListener('click', cargarRegistros);
        document.getElementById('buscarInput').addEventListener('keypress', e => { if(e.key==='Enter') cargarRegistros(); });
        document.getElementById('limpiarBtn').addEventListener('click', () => {
            document.getElementById('buscarInput').value = '';
            document.getElementById('estadoSelect').value = '';
            document.getElementById('todosCheckbox').checked = false;
            cargarRegistros();
        });
        document.getElementById('todosCheckbox').addEventListener('change', e => {
            if (e.target.checked) {
                document.getElementById('buscarInput').value = '';
                document.getElementById('estadoSelect').value = '';
                cargarRegistros();
            }
        });
        document.getElementById('itemsPerPageSelect').addEventListener('change', e => {
            itemsPerPage = parseInt(e.target.value);
            currentPage = 1;
            mostrarRegistrosPaginados();
        });
    });

    function mostrarRegistrosPaginados() {
        const start = (currentPage - 1) * itemsPerPage;
        const end = Math.min(start + itemsPerPage, allRegistros.length);
        const total = Math.ceil(allRegistros.length / itemsPerPage);
        document.getElementById('startRecord').textContent = allRegistros.length > 0 ? start + 1 : 0;
        document.getElementById('endRecord').textContent = end;
        document.getElementById('prevPage').classList.toggle('disabled', currentPage === 1);
        document.getElementById('nextPage').classList.toggle('disabled', currentPage === total || total === 0);
        document.getElementById('totalRecords').textContent = allRegistros.length;
        mostrarRegistros(allRegistros.slice(start, end));
    }

    function mostrarRegistros(registros) {
        const tbody = document.getElementById('tablaRegistros');
        if (!registros || registros.length === 0) {
            tbody.innerHTML = `<tr><td colspan="6" class="state-cell"><i class="fas fa-flask"></i> No se encontraron registros</td></tr>`;
            return;
        }
        tbody.innerHTML = registros.map(r => {
            const estadoClass = r.estado === 'ACTIVO' ? 'activo' : 'inactivo';
            const creado = r.creadoEn ? new Date(r.creadoEn).toLocaleDateString('es-MX') : '—';
            const actualizado = r.actualizadoEn ? new Date(r.actualizadoEn).toLocaleDateString('es-MX') : '—';
            return `<tr>
                <td><i class="fas fa-file-alt me-2" style="color:var(--accent-cyan);"></i>${r.nombre || '—'}</td>
                <td><span class="estado-badge ${estadoClass}">${r.estado || '—'}</span></td>
                <td>${creado}</td>
                <td>${actualizado}</td>
                <td><button class="btn-edit" onclick="abrirModalEditar('${r.id}')"><i class="fas fa-pencil-alt"></i></button></td>
                <td><button class="btn-del" onclick="abrirModalEliminar('${r.id}','${r.nombre}')"><i class="fas fa-trash"></i></button></td>
            </tr>`;
        }).join('');
    }

    function cambiarPagina(nueva) {
        const total = Math.ceil(allRegistros.length / itemsPerPage);
        if (nueva >= 1 && nueva <= total) { currentPage = nueva; mostrarRegistrosPaginados(); }
    }

    function cargarRegistros() {
        const buscar = document.getElementById('buscarInput').value;
        const estado = document.getElementById('estadoSelect').value;
        let url = '/api/registros-prueba/buscar?';
        if (buscar) url += 'query=' + encodeURIComponent(buscar) + '&';
        
        fetch(url)
            .then(r => r.ok ? r.json() : r.text().then(t => { throw new Error(t); }))
            .then(data => {
                let registros = data.data || [];
                if (estado) registros = registros.filter(r => r.estado === estado);
                allRegistros = registros;
                currentPage = 1;
                mostrarRegistrosPaginados();
            })
            .catch(() => {
                fetch('/api/registros-prueba')
                    .then(r => r.json())
                    .then(data => {
                        let registros = data.data || [];
                        if (estado) registros = registros.filter(r => r.estado === estado);
                        allRegistros = registros;
                        currentPage = 1;
                        mostrarRegistrosPaginados();
                    })
                    .catch(() => document.getElementById('tablaRegistros').innerHTML = '<tr><td colspan="6" class="state-cell">Error al cargar registros</td></tr>');
            });
    }

    function limpiarValidaciones() {
        document.querySelectorAll('.is-invalid').forEach(el => el.classList.remove('is-invalid'));
        document.querySelectorAll('.invalid-feedback').forEach(el => el.textContent = '');
    }

    function abrirModalNuevo() {
        document.getElementById('modalTitleText').textContent = 'Nuevo Registro';
        document.getElementById('registroForm').reset();
        document.getElementById('registroId').value = '';
        document.getElementById('estado').value = 'ACTIVO';
        limpiarValidaciones();
        modalInstance.show();
    }

    function abrirModalEditar(id) {
        fetch(`/api/registros-prueba/${id}`)
            .then(r => r.json())
            .then(r => {
                document.getElementById('modalTitleText').textContent = 'Editar Registro';
                document.getElementById('registroId').value = r.id;
                document.getElementById('nombre').value = r.nombre || '';
                document.getElementById('estado').value = r.estado || 'ACTIVO';
                limpiarValidaciones();
                modalInstance.show();
            })
            .catch(() => mostrarToast('Error al cargar el registro', 'error'));
    }

    function guardarRegistro() {
        const id = document.getElementById('registroId').value;
        const esNuevo = !id;
        limpiarValidaciones();
        
        const nombre = document.getElementById('nombre').value.trim();
        const estado = document.getElementById('estado').value;
        
        if (!nombre) {
            document.getElementById('nombreError').textContent = 'El nombre es requerido';
            document.getElementById('nombre').classList.add('is-invalid');
            return;
        }

        const datos = { nombre, estado };
        const url = esNuevo ? '/api/registros-prueba' : `/api/registros-prueba/${id}`;
        
        fetch(url, {
            method: esNuevo ? 'POST' : 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(datos)
        })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    modalInstance.hide();
                    cargarRegistros();
                    mostrarToast(esNuevo ? 'Registro creado' : 'Registro actualizado', 'success');
                } else {
                    mostrarToast('Error: ' + data.message, 'error');
                }
            })
            .catch(() => mostrarToast('Error al guardar', 'error'));
    }

    function abrirModalEliminar(id, nombre) {
        registroIdEliminar = id;
        document.getElementById('registroAEliminar').textContent = nombre;
        eliminarModalInstance.show();
    }

    function confirmarEliminar() {
        if (!registroIdEliminar) return;
        fetch(`/api/registros-prueba/${registroIdEliminar}`, { method: 'DELETE' })
            .then(r => r.json())
            .then(data => {
                eliminarModalInstance.hide();
                if (data.success) {
                    cargarRegistros();
                    mostrarToast('Registro eliminado', 'success');
                } else {
                    mostrarToast('Error al eliminar', 'error');
                }
            })
            .catch(() => mostrarToast('Error al eliminar', 'error'));
    }

    function mostrarToast(msg, tipo) {
        const ex = document.getElementById('appToast'); if (ex) ex.remove();
        const t = document.createElement('div'); t.id = 'appToast';
        const isSuccess = tipo === 'success';
        t.style.cssText = `position:fixed;bottom:24px;right:24px;z-index:9999;
            background:${isSuccess ? 'linear-gradient(135deg,#00e5ff,#7c3aed)' : 'linear-gradient(135deg,#dc2626,#ef4444)'};
            color:#fff;padding:12px 20px;border-radius:10px;font-size:0.85rem;font-weight:700;
            display:flex;align-items:center;gap:10px;box-shadow:0 8px 24px rgba(0,0,0,0.5);`;
        t.innerHTML = `<i class="fas ${isSuccess ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i>${msg}`;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 3500);
    }
</script>
</body>
</html>
