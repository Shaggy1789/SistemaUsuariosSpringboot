<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titulo}">Permisos — Santa Mónica</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/navbar.css">
    <link rel="stylesheet" href="/css/ocultar.css">
    <link rel="stylesheet" href="/css/permisos.css">
</head>
<body>

<!-- ══ NAVBAR ══ -->
<nav class="topnav">
    <a class="topnav-brand" th:href="@{/}">
        <i class="fas fa-heartbeat"></i> Santa Mónica
    </a>
    <ul class="topnav-menu" id="navMenu">
        <li><a th:href="@{/}"><i class="fas fa-home"></i> Inicio</a></li>
        <li id="navModulosItem" style="display:none;">
            <span>Módulos <i class="fas fa-chevron-down arrow"></i></span>
            <div class="dropdown-nav" id="navModulosDropdown"></div>
        </li>
    </ul>
    <div class="topnav-right">
        <div class="user-pill">
            <i class="fas fa-user-circle"></i>
            <span th:text="${session.usuario.usuario}">Usuario</span>
            <span class="role-tag"
                  th:if="${session.usuario.perfil != null}"
                  th:text="${session.usuario.perfil.nombre}">Rol</span>
        </div>
        <a class="btn-logout" th:href="@{/logout}">
            <i class="fas fa-sign-out-alt"></i> Salir
        </a>
    </div>
</nav>

<!-- ══ CONTENT ══ -->
<div class="page-wrap">

    <!-- Header -->
    <div class="page-header">
        <div class="page-header-icon">
            <i class="fas fa-shield-alt"></i>
        </div>
        <div>
            <h1>Permisos por Perfil</h1>
        </div>
        <div class="admin-badge" style="margin-left:auto;">
            <i class="fas fa-crown"></i> Solo Administrador
        </div>
    </div>

    <!-- Selector de perfil -->
    <div class="selector-panel">
        <div>
            <label class="form-label">Perfil:</label>
            <select id="perfilSelect" class="form-select">
                <option value="">— Selecciona un perfil —</option>
            </select>
        </div>
        <button class="btn-gold" id="btnBuscar" onclick="cargarPermisos()">
            <i class="fas fa-search"></i> Buscar
        </button>
    </div>

    <!-- Tabla de permisos -->
    <div class="permisos-card" id="permisosCard" style="display:none;">

        <div class="permisos-header">
            <span class="permisos-header-label">
                <i class="fas fa-th-large me-2"></i>Módulos del sistema
            </span>
            <div class="permisos-header-actions">
                <button class="btn-gold-outline" onclick="marcarTodos(true)">
                    <i class="fas fa-check-double"></i> Todos
                </button>
                <button class="btn-gold-outline" onclick="marcarTodos(false)">
                    <i class="fas fa-times"></i> Ninguno
                </button>
            </div>
        </div>

        <div class="table-responsive">
            <table class="permisos-table">
                <thead>
                <tr id="tablaHeader">
                    <th>Módulo</th>
                    <!-- columnas de tipos de permiso se generan dinámicamente -->
                </tr>
                </thead>
                <tbody id="tablaBody">
                <tr class="state-row">
                    <td colspan="9">
                        <i class="fas fa-spinner fa-spin"></i>
                        Cargando permisos...
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <!-- Toolbar guardar -->
        <div class="save-toolbar">
            <span class="hint">
                <i class="fas fa-info-circle me-1"></i>
                Los cambios se aplican al guardar.
            </span>
            <div style="display:flex;gap:8px;">
                <button class="btn-gold-outline" onclick="cancelar()">
                    <i class="fas fa-times"></i> Cancelar
                </button>
                <button class="btn-gold" id="btnGuardar" onclick="guardarTodos()">
                    <i class="fas fa-save"></i> Guardar permisos
                </button>
            </div>
        </div>
    </div>

    <!-- Estado inicial (sin perfil seleccionado) -->
    <div id="estadoInicial"
         style="text-align:center;padding:4rem 1rem;color:var(--text-muted);">
        <i class="fas fa-shield-alt"
           style="font-size:3rem;color:var(--gold-dark);display:block;margin-bottom:1rem;opacity:0.4;"></i>
        <p style="font-size:0.9rem;">Selecciona un perfil y presiona <strong style="color:var(--gold-light);">Buscar</strong> para ver sus permisos.</p>
    </div>
</div><!-- /page-wrap -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/sliderbar.js"></script>
<script src="/js/permisos-ui.js"></script>
<script>
    // ── VARIABLES GLOBALES ───────────────────────────────────
    let tiposPermiso   = [];
    let modulosPermisos = [];
    let perfilActual   = null;
    // Detectar si es admin desde la sesión de Thymeleaf
const esAdminSession = /*[[${session.usuario.perfil.nombre == 'ADMIN' || session.usuario.perfil.nombre == 'ADMINISTRADOR'}]]*/ false;
const modoConsulta = esAdminSession ? false : (/*[[${modoConsulta}]]*/ false);
console.log('🔥 permisos.html cargado');
console.log('📌 modoConsulta:', modoConsulta);
console.log('📌 esAdminSession:', esAdminSession);

    console.log('🔥 permisos.html cargado');
    console.log('📌 modoConsulta:', modoConsulta);

    // ── INIT ─────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', () => {
        cargarPerfiles();
        cargarTiposPermiso();

        // 🔥 Deshabilitar botones de acción en modo consulta
        if (modoConsulta) {
            const btnTodos = document.querySelector('button[onclick="marcarTodos(true)"]');
            const btnNinguno = document.querySelector('button[onclick="marcarTodos(false)"]');
            if (btnTodos) btnTodos.disabled = true;
            if (btnNinguno) btnNinguno.disabled = true;
        }

        // Buscar con Enter en el select
        document.getElementById('perfilSelect').addEventListener('keydown', e => {
            if (e.key === 'Enter') cargarPermisos();
        });
    });

    // ── CARGAR PERFILES ───────────────────────────────────────
    function cargarPerfiles() {
        fetch('/api/permisos/perfiles')
            .then(r => r.json())
            .then(data => {
                const sel = document.getElementById('perfilSelect');
                sel.innerHTML = '<option value="">— Selecciona un perfil —</option>';
                (data.data || []).forEach(p => {
                    sel.innerHTML += `<option value="${p.id}">${p.nombre}</option>`;
                });

                // Si es modo consulta, obtener perfil del usuario y cargar automáticamente
                if (modoConsulta) {
                    fetch('/api/permisos/mi-perfil')
                        .then(r => r.json())
                        .then(resp => {
                            if (resp.success) {
                                sel.value = resp.data;
                                sel.disabled = true;
                                document.getElementById('btnBuscar').style.display = 'none';

                                // Ocultar elementos de edición
                                document.querySelector('.permisos-header-actions').style.display = 'none';
                                document.querySelector('.save-toolbar').style.display = 'none';
                                document.querySelector('.admin-badge').style.display = 'none';

                                // Cargar permisos automáticamente
                                setTimeout(() => cargarPermisos(), 100);
                            }
                        })
                        .catch(err => console.error('Error al obtener mi perfil:', err));
                }
            })
            .catch(err => {
                console.error('Error al cargar perfiles:', err);
                mostrarToast('Error al cargar perfiles', 'error');
            });
    }

    // ── CARGAR TIPOS DE PERMISO ───────────────────────────────
    function cargarTiposPermiso() {
        fetch('/api/permisos/tipos')
            .then(r => r.json())
            .then(data => {
                tiposPermiso = data.data || [];
                console.log('📌 Tipos de permiso cargados:', tiposPermiso.length);
            })
            .catch(err => console.error('Error al cargar tipos:', err));
    }

    // ── CARGAR PERMISOS DEL PERFIL SELECCIONADO ───────────────
    function cargarPermisos() {
        const perfilId = document.getElementById('perfilSelect').value;
        if (!perfilId) {
            mostrarToast('Selecciona un perfil primero', 'warning');
            return;
        }
        perfilActual = perfilId;
        console.log('📌 Cargando permisos para perfil:', perfilId);

        document.getElementById('estadoInicial').style.display = 'none';
        document.getElementById('permisosCard').style.display = 'block';
        document.getElementById('tablaBody').innerHTML = `
            <tr class="state-row"><td colspan="${tiposPermiso.length + 1}">
                <i class="fas fa-spinner fa-spin"></i> Cargando...
            </td></tr>`;

        fetch(`/api/permisos/${perfilId}`)
            .then(r => r.json())
            .then(data => {
                modulosPermisos = data.data || [];
                console.log('📌 Permisos cargados:', modulosPermisos.length);
                renderTabla();

                // 🔥 Bloquear checkboxes después de renderizar
                if (modoConsulta) {
                    document.querySelectorAll('.perm-check').forEach(cb => {
                        cb.disabled = true;
                    });
                }
            })
            .catch(err => {
                console.error('Error al cargar permisos:', err);
                mostrarToast('Error al cargar permisos', 'error');
            });
    }

    // ── RENDERIZAR TABLA ──────────────────────────────────────
    function renderTabla() {
        console.log('📌 Renderizando tabla...');

        // Cabecera dinámica con los tipos de permiso
        const header = document.getElementById('tablaHeader');
        header.innerHTML = '<th>Módulo</th>' +
            tiposPermiso.map(tp =>
                `<th title="${tp.nombre}">${tp.nombreMostrar || tp.nombre}</th>`
            ).join('');

        // Filas
        const tbody = document.getElementById('tablaBody');
        if (!modulosPermisos.length) {
            tbody.innerHTML = `<tr class="state-row"><td colspan="${tiposPermiso.length+1}">
                <i class="fas fa-box-open"></i> No hay módulos registrados
            </td></tr>`;
            return;
        }

        tbody.innerHTML = modulosPermisos.map(m => {
            const icono = m.moduloIcono || iconoFallback(m.moduloNombre);
            const cols = tiposPermiso.map(tp => {
                const checked = (m.tiposPermisoIds || []).includes(tp.id) ? 'checked' : '';
                const disabled = modoConsulta ? 'disabled' : '';
                return `<td>
                    <input type="checkbox" class="perm-check"
                           data-modulo="${m.moduloId}"
                           data-tipo="${tp.id}"
                           ${checked} ${disabled}
                           onchange="onCheckChange('${m.moduloId}','${tp.id}',this.checked)">
                </td>`;
            }).join('');

            return `<tr>
                <td>
                    <div class="modulo-icon-cell">
                        <i class="fas ${icono}"></i>
                    </div>
                    ${m.moduloNombreMostrar || m.moduloNombre}
                </td>
                ${cols}
            </tr>`;
        }).join('');

        // 🔥 Bloquear checkboxes nuevamente (por seguridad)
        if (modoConsulta) {
            document.querySelectorAll('.perm-check').forEach(cb => {
                cb.disabled = true;
            });
        }

        console.log('📌 Tabla renderizada');
    }

    // ── CAMBIO EN CHECKBOX ────────────────────────────────────
    function onCheckChange(moduloId, tipoId, checked) {
        const m = modulosPermisos.find(x => x.moduloId === moduloId);
        if (!m) return;
        if (!m.tiposPermisoIds) m.tiposPermisoIds = [];
        if (checked) {
            if (!m.tiposPermisoIds.includes(tipoId)) m.tiposPermisoIds.push(tipoId);
        } else {
            m.tiposPermisoIds = m.tiposPermisoIds.filter(id => id !== tipoId);
        }
    }

    // ── MARCAR / DESMARCAR TODOS ──────────────────────────────
    function marcarTodos(estado) {
        document.querySelectorAll('.perm-check').forEach(cb => {
            cb.checked = estado;
            const moduloId = cb.dataset.modulo;
            const tipoId   = cb.dataset.tipo;
            onCheckChange(moduloId, tipoId, estado);
        });
    }

    // ── GUARDAR TODOS LOS PERMISOS ────────────────────────────
    function guardarTodos() {
        if (!perfilActual) return;

        const btn = document.getElementById('btnGuardar');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Guardando...';

        const payload = modulosPermisos.map(m => ({
            moduloId:        m.moduloId,
            tiposPermisoIds: m.tiposPermisoIds || []
        }));

        fetch(`/api/permisos/${perfilActual}/guardar-todos`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        })
        .then(r => r.json())
        .then(data => {
            if (data.success) {
                mostrarToast('Permisos guardados correctamente', 'success');
            } else {
                mostrarToast('Error: ' + data.message, 'error');
            }
        })
        .catch(() => mostrarToast('Error al guardar permisos', 'error'))
        .finally(() => {
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-save"></i> Guardar permisos';
        });
    }

    // ── CANCELAR ──────────────────────────────────────────────
    function cancelar() {
        document.getElementById('permisosCard').style.display = 'none';
        document.getElementById('estadoInicial').style.display = 'block';
        document.getElementById('perfilSelect').value = '';
        perfilActual = null;
        modulosPermisos = [];
    }

    // ── ICONO FALLBACK ────────────────────────────────────────
    function iconoFallback(nombre) {
        const n = (nombre || '').toLowerCase();
        if (n.includes('usuario'))  return 'fa-users';
        if (n.includes('perfil'))   return 'fa-id-badge';
        if (n.includes('permiso'))  return 'fa-lock';
        if (n.includes('modulo'))   return 'fa-th-large';
        if (n.includes('config'))   return 'fa-cogs';
        if (n.includes('bitacora')) return 'fa-clipboard-list';
        if (n.includes('almacen'))  return 'fa-boxes-stacked';
        if (n.includes('reporte'))  return 'fa-chart-bar';
        return 'fa-puzzle-piece';
    }

    // ── TOAST ─────────────────────────────────────────────────
    function mostrarToast(msg, tipo) {
        const ex = document.getElementById('appToast');
        if (ex) ex.remove();
        const t = document.createElement('div');
        t.id = 'appToast';
        const colors = {
            success: 'linear-gradient(135deg,#a07830,#c9a84c)',
            error:   'linear-gradient(135deg,#9b2c2c,#e53e3e)',
            warning: 'linear-gradient(135deg,#92400e,#d97706)'
        };
        const icons = {
            success: 'fa-check-circle',
            error: 'fa-exclamation-circle',
            warning: 'fa-triangle-exclamation'
        };
        t.style.cssText = `position:fixed;bottom:24px;right:24px;z-index:9999;
            background:${colors[tipo]||colors.error};
            color:${tipo==='success'?'#0d0d0d':'#fff'};
            padding:12px 20px;border-radius:10px;font-size:0.85rem;font-weight:700;
            display:flex;align-items:center;gap:10px;box-shadow:0 8px 24px rgba(0,0,0,0.5);`;
        t.innerHTML = `<i class="fas ${icons[tipo]||icons.error}"></i>${msg}`;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 3500);
    }
</script>
</body>
</html>
