<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titulo}">Inicio de Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.google.com/recaptcha/api.js?render=6LdJmHAsAAAAAIxiOLPzSMjlUdd_S_PLSDqg1hbq"></script>
    <style>
        :root {
            --gold:       #c9a84c;
            --gold-light: #e8c96a;
            --gold-dark:  #a07830;
            --black:      #0d0d0d;
            --black-2:    #161616;
            --black-3:    #1f1f1f;
            --black-4:    #2a2a2a;
            --text-muted: #8a8a8a;
        }

        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        * { box-sizing: border-box; }

        body {
            background: var(--black);
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(201,168,76,0.07) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(201,168,76,0.05) 0%, transparent 50%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 440px;
            margin: 0 auto;
        }

        .login-card {
            background: var(--black-2);
            border-radius: 16px;
            border: 1px solid rgba(201,168,76,0.2);
            box-shadow:
                0 0 0 1px rgba(201,168,76,0.05),
                0 24px 48px rgba(0,0,0,0.6),
                0 0 80px rgba(201,168,76,0.04);
            overflow: hidden;
        }

        /* ── HEADER ── */
        .login-header {
            background: var(--black-3);
            border-bottom: 1px solid rgba(201,168,76,0.25);
            padding: 2.5rem 2rem;
            text-align: center;
            position: relative;
        }
        .login-header::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
        }
        .header-icon-wrap {
            width: 64px; height: 64px;
            border-radius: 50%;
            background: rgba(201,168,76,0.1);
            border: 1px solid rgba(201,168,76,0.3);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1.25rem;
        }
        .header-icon-wrap i {
            font-size: 1.6rem;
            color: var(--gold);
        }
        .login-header h2 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 0.3rem;
            letter-spacing: 0.3px;
        }
        .login-header p {
            color: var(--text-muted);
            margin: 0;
            font-size: 0.85rem;
        }

        /* ── FORM ── */
        .form-content { padding: 2rem; }

        .form-label {
            font-weight: 600;
            color: #b0b0b0;
            margin-bottom: 6px;
            font-size: 0.82rem;
            text-transform: uppercase;
            letter-spacing: 0.6px;
        }

        .input-group-text {
            background: var(--black-4);
            border: 1px solid rgba(201,168,76,0.2);
            border-right: none;
            border-radius: 8px 0 0 8px;
            padding: 0 14px;
            color: var(--gold);
        }

        .form-control {
            background: var(--black-4);
            border: 1px solid rgba(201,168,76,0.2);
            border-left: none;
            border-radius: 0 8px 8px 0;
            padding: 12px 16px;
            font-size: 0.95rem;
            color: #e8e8e8;
            transition: all 0.25s;
        }
        .form-control::placeholder { color: #555; }
        .form-control:focus {
            background: var(--black-4);
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(201,168,76,0.12);
            color: #fff;
            outline: none;
        }
        .form-control.is-invalid-custom {
            border-color: #e53e3e !important;
            box-shadow: 0 0 0 3px rgba(229,62,62,0.12) !important;
        }
        .input-group-text.is-invalid-custom {
            border-color: #e53e3e !important;
        }
        .input-group { margin-bottom: 1.25rem; }

        /* ── BUTTON ── */
        .btn-login {
            background: linear-gradient(135deg, var(--gold-dark), var(--gold), var(--gold-light));
            border: none;
            padding: 13px;
            border-radius: 8px;
            color: #0d0d0d;
            font-weight: 700;
            font-size: 0.95rem;
            transition: all 0.3s;
            width: 100%;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
        }
        .btn-login::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.15));
            opacity: 0;
            transition: opacity 0.3s;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(201,168,76,0.4);
        }
        .btn-login:hover::after { opacity: 1; }
        .btn-login:disabled {
            opacity: 0.6;
            transform: none;
            cursor: not-allowed;
        }

        /* ── ALERTS ── */
        .alert {
            border-radius: 8px;
            border: none;
            padding: 0.9rem 1rem;
            margin-bottom: 1.25rem;
            font-size: 0.88rem;
        }
        .alert-danger  { background: rgba(229,62,62,0.12); color: #fc8181; border: 1px solid rgba(229,62,62,0.25); }
        .alert-success { background: rgba(201,168,76,0.1); color: var(--gold-light); border: 1px solid rgba(201,168,76,0.25); }

        /* ── DIVIDER ── */
        .gold-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(201,168,76,0.3), transparent);
            margin: 1.5rem 0;
        }

        /* ── MODAL ── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.75);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
            animation: fadeInOverlay 0.2s ease;
        }
        .modal-overlay.show { display: flex; }
        @keyframes fadeInOverlay { from{opacity:0} to{opacity:1} }

        .modal-box {
            background: var(--black-2);
            border: 1px solid rgba(201,168,76,0.25);
            border-radius: 14px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 24px 60px rgba(0,0,0,0.7), 0 0 0 1px rgba(201,168,76,0.08);
            overflow: hidden;
            animation: slideUp 0.25s ease;
        }
        @keyframes slideUp {
            from { transform: translateY(28px); opacity: 0; }
            to   { transform: translateY(0);    opacity: 1; }
        }
        .modal-header-custom {
            padding: 1.4rem 1.5rem 1rem;
            display: flex; align-items: center; gap: 12px;
            border-bottom: 1px solid rgba(201,168,76,0.1);
        }
        .modal-icon {
            width: 44px; height: 44px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem; flex-shrink: 0;
        }
        .modal-icon.error   { background: rgba(229,62,62,0.15); color: #fc8181; border: 1px solid rgba(229,62,62,0.25); }
        .modal-icon.warning { background: rgba(201,168,76,0.12); color: var(--gold); border: 1px solid rgba(201,168,76,0.25); }
        .modal-title-custom { font-size: 0.95rem; font-weight: 700; color: #fff; margin: 0; }
        .modal-subtitle     { font-size: 0.78rem; color: var(--text-muted); margin: 2px 0 0; }
        .modal-body-custom  { padding: 1rem 1.5rem; }
        .validation-list    { list-style: none; padding: 0; margin: 0; }
        .validation-list li {
            display: flex; align-items: flex-start; gap: 8px;
            padding: 8px 12px; border-radius: 6px;
            background: rgba(229,62,62,0.08);
            border: 1px solid rgba(229,62,62,0.15);
            color: #fc8181;
            font-size: 0.85rem; margin-bottom: 6px;
        }
        .validation-list li:last-child { margin-bottom: 0; }
        .validation-list li i { margin-top: 2px; flex-shrink: 0; }
        .modal-message { font-size: 0.88rem; color: #9a9a9a; line-height: 1.5; }
        .modal-footer-custom {
            padding: 0.75rem 1.5rem 1.25rem;
            display: flex; gap: 8px; justify-content: flex-end;
        }
        .btn-modal-close {
            padding: 8px 20px; border-radius: 7px;
            font-weight: 600; font-size: 0.85rem;
            cursor: pointer; border: none; transition: all 0.2s;
            text-transform: uppercase; letter-spacing: 0.4px;
        }
        .btn-modal-close.error   { background: linear-gradient(135deg,#9b2c2c,#e53e3e); color: #fff; }
        .btn-modal-close.error:hover { box-shadow: 0 4px 12px rgba(229,62,62,0.4); }
        .btn-modal-close.warning { background: linear-gradient(135deg, var(--gold-dark), var(--gold)); color: #0d0d0d; }
        .btn-modal-close.warning:hover { box-shadow: 0 4px 12px rgba(201,168,76,0.4); }

        .spinner-border-sm { width: 1rem; height: 1rem; border-width: 2px; }

        @media (max-width: 576px) {
            .form-content { padding: 1.5rem; }
            .login-header { padding: 2rem 1.5rem; }
            body { padding: 15px; }
        }
    </style>
</head>
<body>

<!-- ── MODAL ── -->
<div class="modal-overlay" id="loginModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-box">
        <div class="modal-header-custom">
            <div class="modal-icon" id="modalIcon">
                <i id="modalIconClass" class="fas fa-exclamation-circle"></i>
            </div>
            <div>
                <p class="modal-title-custom" id="modalTitle">Título</p>
                <p class="modal-subtitle" id="modalSubtitle"></p>
            </div>
        </div>
        <div class="modal-body-custom" id="modalBody"></div>
        <div class="modal-footer-custom">
            <button class="btn-modal-close" id="modalCloseBtn" onclick="closeModal()">Entendido</button>
        </div>
    </div>
</div>

<!-- ── CARD ── -->
<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <div class="header-icon-wrap">
                <i class="fas fa-heartbeat"></i>
            </div>
            <h2>Santa Mónica</h2>
            <p>Sistema de Gestión Clínica &mdash; Acceso restringido</p>
        </div>

        <div class="form-content">

            <div th:if="${mensajeLogout}" class="alert alert-success" role="alert">
                <i class="fas fa-check-circle me-2"></i>
                <span th:text="${mensajeLogout}"></span>
            </div>
            <div th:if="${error}" class="alert alert-danger" role="alert">
                <i class="fas fa-exclamation-circle me-2"></i>
                <span th:text="${error}"></span>
            </div>

            <form th:action="@{/api/login}" method="post" id="loginForm" novalidate>

                <div class="mb-3">
                    <label class="form-label" for="inputUsuario">Usuario</label>
                    <div class="input-group" id="groupUsuario">
                        <span class="input-group-text" id="iconUsuario">
                            <i class="fas fa-user"></i>
                        </span>
                        <input type="text" id="inputUsuario" name="usuario"
                               class="form-control"
                               placeholder="Ingresa tu usuario"
                               th:value="${param.usuario}"
                               autocomplete="username" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label" for="inputPassword">Contraseña</label>
                    <div class="input-group" id="groupPassword">
                        <span class="input-group-text" id="iconPassword">
                            <i class="fas fa-key"></i>
                        </span>
                        <input type="password" id="inputPassword" name="password"
                               class="form-control"
                               placeholder="Ingresa tu contraseña"
                               autocomplete="current-password" required>
                    </div>
                </div>

                <input type="hidden" name="g-recaptcha-response" id="recaptchaToken">

                <button type="submit" class="btn-login mb-3" id="submitBtn">
                    <i class="fas fa-sign-in-alt me-2"></i>Ingresar al sistema
                </button>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function showModal({ type = 'error', title, subtitle = '', body }) {
        const overlay    = document.getElementById('loginModal');
        const iconWrap   = document.getElementById('modalIcon');
        const iconEl     = document.getElementById('modalIconClass');
        const titleEl    = document.getElementById('modalTitle');
        const subtitleEl = document.getElementById('modalSubtitle');
        const bodyEl     = document.getElementById('modalBody');
        const closeBtn   = document.getElementById('modalCloseBtn');
        const config = {
            error:   { icon: 'fa-exclamation-circle', label: 'Entendido' },
            warning: { icon: 'fa-triangle-exclamation', label: 'Entendido' },
        };
        const cfg = config[type] || config.error;
        iconWrap.className     = `modal-icon ${type}`;
        iconEl.className       = `fas ${cfg.icon}`;
        titleEl.textContent    = title;
        subtitleEl.textContent = subtitle;
        closeBtn.className     = `btn-modal-close ${type}`;
        closeBtn.textContent   = cfg.label;
        bodyEl.innerHTML       = body;
        overlay.classList.add('show');
    }

    function closeModal() {
        document.getElementById('loginModal').classList.remove('show');
        clearInputErrors();
    }

    document.getElementById('loginModal').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
    });
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closeModal();
    });

    const USUARIO_MIN = 3, PASS_MIN = 6;

    function clearInputErrors() {
        ['inputUsuario','inputPassword'].forEach(id =>
            document.getElementById(id).classList.remove('is-invalid-custom'));
        ['iconUsuario','iconPassword'].forEach(id =>
            document.getElementById(id).classList.remove('is-invalid-custom'));
    }
    function markInputError(inputId, iconId) {
        document.getElementById(inputId).classList.add('is-invalid-custom');
        document.getElementById(iconId).classList.add('is-invalid-custom');
    }
    function validateForm() {
        const usuario  = document.getElementById('inputUsuario').value.trim();
        const password = document.getElementById('inputPassword').value;
        const errors   = [];
        clearInputErrors();
        if (!usuario) errors.push({ field:'usuario', msg:'El nombre de usuario es obligatorio.' });
        else if (usuario.length < USUARIO_MIN) errors.push({ field:'usuario', msg:`Mínimo ${USUARIO_MIN} caracteres.` });
        else if (/\s/.test(usuario)) errors.push({ field:'usuario', msg:'Sin espacios.' });
        if (!password) errors.push({ field:'password', msg:'La contraseña es obligatoria.' });
        else if (password.length < PASS_MIN) errors.push({ field:'password', msg:`Mínimo ${PASS_MIN} caracteres.` });
        return errors;
    }
    function buildErrorList(errors) {
        return `<ul class="validation-list">
            ${errors.map(e=>`<li><i class="fas fa-circle-xmark"></i><span>${e.msg}</span></li>`).join('')}
        </ul>`;
    }

    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const errors = validateForm();
        if (errors.length > 0) {
            errors.forEach(err => {
                if (err.field==='usuario')  markInputError('inputUsuario','iconUsuario');
                if (err.field==='password') markInputError('inputPassword','iconPassword');
            });
            showModal({ type:'error', title:'Datos incorrectos',
                subtitle: errors.length===1 ? 'Hay un campo que necesita corrección' : `${errors.length} campos con error`,
                body: buildErrorList(errors) });
            return;
        }
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerHTML = `<span class="spinner-border spinner-border-sm me-2" role="status"></span>Verificando...`;

        grecaptcha.ready(function() {
            grecaptcha.execute('6LdJmHAsAAAAAIxiOLPzSMjlUdd_S_PLSDqg1hbq', {action:'login'})
                .then(token => {
                    document.getElementById('recaptchaToken').value = token;
                    return fetch('/api/login', { method:'POST', body: new FormData(document.getElementById('loginForm')) });
                })
                .then(r => { if (!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
                .then(data => {
                    if (data.success) {
                        window.location.href = data.redirect || '/';
                    } else {
                        resetBtn();
                        let subtitle = 'Verifica tus datos e intenta de nuevo';
                        if (data.error==='inactivo') subtitle = 'Cuenta inhabilitada — contacta al administrador';
                        if (data.error==='captcha')  subtitle = 'Verificación de seguridad fallida';
                        showModal({ type:'error', title:'Acceso denegado', subtitle,
                            body:`<ul class="validation-list"><li><i class="fas fa-circle-xmark"></i><span>${data.message||'Credenciales incorrectas.'}</span></li></ul>` });
                    }
                })
                .catch(err => {
                    resetBtn();
                    showModal({ type:'warning', title:'Error de conexión', subtitle:'No se pudo contactar al servidor',
                        body:`<p class="modal-message">Revisa tu conexión e intenta de nuevo.<br><br><small style="color:#555;">Detalle: ${err.message}</small></p>` });
                });
        }).catch(() => {
            resetBtn();
            showModal({ type:'warning', title:'Error con reCAPTCHA', subtitle:'Verificación fallida',
                body:`<p class="modal-message">Recarga la página e intenta de nuevo.</p>` });
        });
    });

    function resetBtn() {
        const btn = document.getElementById('submitBtn');
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-sign-in-alt me-2"></i>Ingresar al sistema';
    }

    document.getElementById('inputUsuario').addEventListener('input', function() {
        this.classList.remove('is-invalid-custom');
        document.getElementById('iconUsuario').classList.remove('is-invalid-custom');
    });
    document.getElementById('inputPassword').addEventListener('input', function() {
        this.classList.remove('is-invalid-custom');
        document.getElementById('iconPassword').classList.remove('is-invalid-custom');
    });
</script>
</body>
</html>
