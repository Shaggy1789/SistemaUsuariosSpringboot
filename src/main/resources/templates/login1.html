<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aegis Auth — Control de Acceso</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.google.com/recaptcha/api.js?render=6LdJmHAsAAAAAIxiOLPzSMjlUdd_S_PLSDqg1hbq"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        :root {
            --bg-primary: #0a0e17;
            --bg-secondary: #111827;
            --bg-tertiary: #1a2333;
            --accent-cyan: #00e5ff;
            --accent-purple: #7c3aed;
            --accent-success: #10b981;
            --accent-error: #ef4444;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --border-dark: #1e293b;
            --glow-cyan: 0 0 20px rgba(0, 229, 255, 0.3);
            --glow-purple: 0 0 30px rgba(124, 58, 237, 0.4);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }
        
        /* Fondo animado con grid */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 229, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 229, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }
        
        /* Gradientes de fondo */
        body::after {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 40%, rgba(124, 58, 237, 0.08) 0%, transparent 40%),
                        radial-gradient(circle at 70% 60%, rgba(0, 229, 255, 0.06) 0%, transparent 40%);
            pointer-events: none;
            z-index: 0;
            animation: bgPulse 15s ease-in-out infinite;
        }
        
        @keyframes bgPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        .login-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 480px;
            padding: 24px;
        }
        
        /* Tarjeta principal */
        .auth-card {
            background: rgba(17, 24, 39, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-dark);
            border-radius: 32px;
            padding: 40px 36px;
            box-shadow: var(--glow-purple), 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            position: relative;
            overflow: hidden;
        }
        
        /* Borde animado */
        .auth-card::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, var(--accent-cyan), var(--accent-purple), var(--accent-cyan));
            border-radius: 34px;
            opacity: 0;
            z-index: -1;
            transition: opacity 0.4s;
        }
        
        .auth-card:hover::before {
            opacity: 0.15;
        }
        
        /* Header */
        .auth-header {
            text-align: center;
            margin-bottom: 36px;
        }
        
        .auth-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 16px;
        }
        
        .logo-icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--glow-cyan);
            transform: rotate(0deg);
            transition: transform 0.3s;
        }
        
        .logo-icon:hover {
            transform: rotate(5deg) scale(1.05);
        }
        
        .logo-icon i {
            font-size: 28px;
            color: #fff;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }
        
        .auth-header h1 {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-cyan), #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
            margin: 0;
            text-shadow: var(--glow-cyan);
        }
        
        .auth-header .subtitle {
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 8px;
        }
        
        .auth-header .subtitle i {
            color: var(--accent-cyan);
            margin: 0 4px;
        }
        
        /* Campos de formulario */
        .input-group-custom {
            margin-bottom: 24px;
            position: relative;
        }
        
        .input-label {
            display: block;
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }
        
        .input-label i {
            color: var(--accent-cyan);
            margin-right: 8px;
            font-size: 14px;
        }
        
        .input-field {
            width: 100%;
            background: rgba(26, 35, 51, 0.7);
            border: 1.5px solid var(--border-dark);
            border-radius: 16px;
            padding: 16px 18px;
            color: var(--text-primary);
            font-size: 15px;
            font-weight: 500;
            transition: all 0.3s;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        
        .input-field:focus {
            outline: none;
            border-color: var(--accent-cyan);
            background: rgba(26, 35, 51, 0.95);
            box-shadow: 0 0 0 4px rgba(0, 229, 255, 0.1), var(--glow-cyan);
        }
        
        .input-field::placeholder {
            color: #4a5568;
            font-weight: 400;
        }
        
        .input-field.is-invalid {
            border-color: var(--accent-error);
            box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.15);
        }
        
        /* Botón de login */
        .btn-auth {
            width: 100%;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            border: none;
            border-radius: 16px;
            padding: 16px 20px;
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 229, 255, 0.2);
        }
        
        .btn-auth::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }
        
        .btn-auth:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 229, 255, 0.3), var(--glow-purple);
        }
        
        .btn-auth:hover::before {
            left: 100%;
        }
        
        .btn-auth:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        /* Footer */
        .auth-footer {
            text-align: center;
            margin-top: 24px;
            color: var(--text-secondary);
            font-size: 13px;
        }
        
        .auth-footer a {
            color: var(--accent-cyan);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }
        
        .auth-footer a:hover {
            color: var(--accent-purple);
        }
        
        /* Modal personalizado */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(10, 14, 23, 0.9);
            backdrop-filter: blur(8px);
            z-index: 9999;
            align-items: center;
            justify-content: center;
        }
        
        .modal-overlay.show {
            display: flex;
        }
        
        .modal-box {
            background: var(--bg-secondary);
            border: 1px solid var(--border-dark);
            border-radius: 24px;
            width: 90%;
            max-width: 420px;
            box-shadow: var(--glow-purple), 0 25px 50px -12px rgba(0,0,0,0.8);
            overflow: hidden;
            animation: modalSlideIn 0.3s ease;
        }
        
        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: translateY(-30px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        
        .modal-header-custom {
            padding: 24px 28px 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            border-bottom: 1px solid var(--border-dark);
        }
        
        .modal-icon {
            width: 52px;
            height: 52px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }
        
        .modal-icon.error {
            background: rgba(239, 68, 68, 0.15);
            color: var(--accent-error);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
        
        .modal-icon.warning {
            background: rgba(0, 229, 255, 0.1);
            color: var(--accent-cyan);
            border: 1px solid rgba(0, 229, 255, 0.3);
        }
        
        .modal-icon.success {
            background: rgba(16, 185, 129, 0.15);
            color: var(--accent-success);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }
        
        .modal-title-custom {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
            margin: 0 0 4px;
        }
        
        .modal-subtitle {
            font-size: 13px;
            color: var(--text-secondary);
        }
        
        .modal-body-custom {
            padding: 20px 28px;
        }
        
        .validation-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        
        .validation-list li {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 12px;
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.15);
            color: #fca5a5;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
        }
        
        .validation-list li:last-child {
            margin-bottom: 0;
        }
        
        .validation-list li i {
            color: var(--accent-error);
            margin-top: 2px;
        }
        
        .modal-message {
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.6;
        }
        
        .modal-footer-custom {
            padding: 16px 28px 24px;
            display: flex;
            justify-content: flex-end;
        }
        
        .btn-modal-close {
            padding: 12px 28px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }
        
        .btn-modal-close.error {
            background: linear-gradient(135deg, #dc2626, var(--accent-error));
            color: #fff;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
        }
        
        .btn-modal-close.warning {
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            color: #fff;
            box-shadow: 0 4px 12px rgba(0, 229, 255, 0.3);
        }
        
        .btn-modal-close:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }
        
        /* Alertas */
        .alert {
            border-radius: 12px;
            padding: 14px 18px;
            margin-bottom: 24px;
            font-size: 13px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .alert-danger {
            background: rgba(239, 68, 68, 0.1);
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }
        
        .alert-success {
            background: rgba(16, 185, 129, 0.1);
            color: #6ee7b7;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }
        
        .spinner-border-sm {
            width: 18px;
            height: 18px;
            border-width: 2px;
            border-color: #fff;
            border-right-color: transparent;
        }
        
        /* Responsive */
        @media (max-width: 576px) {
            .auth-card {
                padding: 30px 24px;
            }
            
            .auth-header h1 {
                font-size: 28px;
            }
            
            .login-wrapper {
                padding: 16px;
            }
        }
    </style>
</head>
<body>

<!-- Modal -->
<div class="modal-overlay" id="loginModal" role="dialog" aria-modal="true">
    <div class="modal-box">
        <div class="modal-header-custom">
            <div class="modal-icon" id="modalIcon">
                <i id="modalIconClass" class="fas fa-shield-hal"></i>
            </div>
            <div>
                <p class="modal-title-custom" id="modalTitle">Título</p>
                <p class="modal-subtitle" id="modalSubtitle"></p>
            </div>
        </div>
        <div class="modal-body-custom" id="modalBody"></div>
        <div class="modal-footer-custom">
            <button class="btn-modal-close" id="modalCloseBtn" onclick="closeModal()">Entendido</button>
        </div>
    </div>
</div>

<!-- Login Card -->
<div class="login-wrapper">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-logo">
                <div class="logo-icon">
                    <i class="fa-solid fa-shield-halved"></i>
                </div>
            </div>
            <h1>AEGIS AUTH</h1>
            <p class="subtitle">
                <i class="fas fa-circle" style="font-size: 6px; vertical-align: middle;"></i>
                CONTROL DE ACCESO
                <i class="fas fa-circle" style="font-size: 6px; vertical-align: middle;"></i>
            </p>
        </div>

        <div class="form-content">
            <div th:if="${mensajeLogout}" class="alert alert-success" role="alert">
                <i class="fas fa-check-circle"></i>
                <span th:text="${mensajeLogout}"></span>
            </div>
            <div th:if="${error}" class="alert alert-danger" role="alert">
                <i class="fas fa-exclamation-triangle"></i>
                <span th:text="${error}"></span>
            </div>

            <form th:action="@{/api/login}" method="post" id="loginForm" novalidate>
                <div class="input-group-custom">
                    <label class="input-label" for="inputUsuario">
                        <i class="fas fa-user-secret"></i> USUARIO
                    </label>
                    <input type="text" id="inputUsuario" name="usuario"
                           class="input-field"
                           placeholder="Ingresa tu nombre de usuario"
                           th:value="${param.usuario}"
                           autocomplete="username" required>
                </div>

                <div class="input-group-custom">
                    <label class="input-label" for="inputPassword">
                        <i class="fas fa-key"></i> CONTRASEÑA
                    </label>
                    <input type="password" id="inputPassword" name="password"
                           class="input-field"
                           placeholder="••••••••••••"
                           autocomplete="current-password" required>
                </div>

                <input type="hidden" name="g-recaptcha-response" id="recaptchaToken">

                <button type="submit" class="btn-auth" id="submitBtn">
                    <i class="fas fa-arrow-right-to-bracket me-2"></i>
                    AUTENTICAR ACCESO
                </button>
            </form>
        </div>
        
        <div class="auth-footer">
            <i class="fas fa-lock me-1"></i> 
            Acceso restringido • Solo personal autorizado
            <br>
            <a href="#"><i class="fas fa-headset me-1"></i>Soporte técnico</a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function showModal({ type = 'error', title, subtitle = '', body }) {
        const overlay    = document.getElementById('loginModal');
        const iconWrap   = document.getElementById('modalIcon');
        const iconEl     = document.getElementById('modalIconClass');
        const titleEl    = document.getElementById('modalTitle');
        const subtitleEl = document.getElementById('modalSubtitle');
        const bodyEl     = document.getElementById('modalBody');
        const closeBtn   = document.getElementById('modalCloseBtn');
        
        const config = {
            error:   { icon: 'fa-shield-hal', label: 'Entendido' },
            warning: { icon: 'fa-triangle-exclamation', label: 'Entendido' },
            success: { icon: 'fa-circle-check', label: 'Continuar' }
        };
        
        const cfg = config[type] || config.error;
        iconWrap.className = `modal-icon ${type}`;
        iconEl.className = `fas ${cfg.icon}`;
        titleEl.textContent = title;
        subtitleEl.textContent = subtitle;
        closeBtn.className = `btn-modal-close ${type}`;
        closeBtn.textContent = cfg.label;
        bodyEl.innerHTML = body;
        overlay.classList.add('show');
    }

    function closeModal() {
        document.getElementById('loginModal').classList.remove('show');
        clearInputErrors();
    }

    document.getElementById('loginModal').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
    });
    
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closeModal();
    });

    const USUARIO_MIN = 3, PASS_MIN = 6;

    function clearInputErrors() {
        ['inputUsuario','inputPassword'].forEach(id =>
            document.getElementById(id).classList.remove('is-invalid'));
    }
    
    function markInputError(inputId) {
        document.getElementById(inputId).classList.add('is-invalid');
    }
    
    function validateForm() {
        const usuario  = document.getElementById('inputUsuario').value.trim();
        const password = document.getElementById('inputPassword').value;
        const errors   = [];
        clearInputErrors();
        
        if (!usuario) errors.push({ field:'usuario', msg:'El nombre de usuario es obligatorio.' });
        else if (usuario.length < USUARIO_MIN) errors.push({ field:'usuario', msg:`Mínimo ${USUARIO_MIN} caracteres.` });
        else if (/\s/.test(usuario)) errors.push({ field:'usuario', msg:'Sin espacios.' });
        
        if (!password) errors.push({ field:'password', msg:'La contraseña es obligatoria.' });
        else if (password.length < PASS_MIN) errors.push({ field:'password', msg:`Mínimo ${PASS_MIN} caracteres.` });
        
        return errors;
    }
    
    function buildErrorList(errors) {
        return `<ul class="validation-list">
            ${errors.map(e=>`<li><i class="fas fa-circle-exclamation"></i><span>${e.msg}</span></li>`).join('')}
        </ul>`;
    }

    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const errors = validateForm();
        
        if (errors.length > 0) {
            errors.forEach(err => {
                if (err.field==='usuario') markInputError('inputUsuario');
                if (err.field==='password') markInputError('inputPassword');
            });
            showModal({ 
                type:'error', 
                title:'Validación fallida',
                subtitle: errors.length===1 ? 'Corrige el campo marcado' : `${errors.length} campos con error`,
                body: buildErrorList(errors) 
            });
            return;
        }
        
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerHTML = `<span class="spinner-border spinner-border-sm me-2" role="status"></span>VERIFICANDO...`;

        grecaptcha.ready(function() {
            grecaptcha.execute('6LdJmHAsAAAAAIxiOLPzSMjlUdd_S_PLSDqg1hbq', {action:'login'})
                .then(token => {
                    document.getElementById('recaptchaToken').value = token;
                    return fetch('/api/login', { 
                        method:'POST', 
                        body: new FormData(document.getElementById('loginForm')) 
                    });
                })
                .then(r => r.json().then(data => ({ ok: r.ok, data })))
                .then(({ ok, data }) => {
                    if (ok && data.success) {
                        window.location.href = data.redirect || '/';
                    } else {
                        resetBtn();
                        let title = 'Acceso denegado';
                        let subtitle = 'Verifica tus credenciales';
                        let message = data.message || 'Credenciales incorrectas.';
                        let type = 'error';
                        
                        if (data.error === 'inactivo') {
                            title = 'Cuenta inhabilitada';
                            subtitle = 'Contacta al administrador';
                            message = 'Tu cuenta está INACTIVA.';
                        } else if (data.error === 'captcha') {
                            title = 'Error de seguridad';
                            subtitle = 'Verificación fallida';
                            message = 'No se pudo verificar el captcha.';
                        } else if (data.error === 'password') {
                            message = 'La contraseña es incorrecta.';
                        } else if (data.error === 'usuario') {
                            message = 'El usuario no existe.';
                        } else if (!ok) {
                            title = 'Error del servidor';
                            subtitle = 'Intenta más tarde';
                            message = 'Error interno. Contacta al administrador.';
                            type = 'warning';
                        }
                        
                        showModal({ type, title, subtitle,
                            body: `<ul class="validation-list"><li><i class="fas fa-circle-exclamation"></i><span>${message}</span></li></ul>` 
                        });
                    }
                })
                .catch(err => {
                    resetBtn();
                    console.error('Error:', err);
                    showModal({ 
                        type:'warning', 
                        title:'Error de conexión',
                        subtitle:'No se pudo contactar al servidor',
                        body:`<p class="modal-message">Revisa tu conexión a internet e intenta de nuevo.</p>` 
                    });
                });
        }).catch(() => {
            resetBtn();
            showModal({ 
                type:'warning', 
                title:'Error con reCAPTCHA',
                subtitle:'Verificación fallida',
                body:`<p class="modal-message">Recarga la página e intenta de nuevo.</p>` 
            });
        });
    });

    function resetBtn() {
        const btn = document.getElementById('submitBtn');
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-arrow-right-to-bracket me-2"></i>AUTENTICAR ACCESO';
    }

    document.getElementById('inputUsuario').addEventListener('input', function() {
        this.classList.remove('is-invalid');
    });
    
    document.getElementById('inputPassword').addEventListener('input', function() {
        this.classList.remove('is-invalid');
    });
</script>
</body>
</html>
